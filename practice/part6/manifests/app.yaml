# The Zero Trust piece:
#
#   - `demo-app` is a plain nginx, reachable at demo-app.zt-lab.svc.cluster.local
#     on cluster port 80. No NetworkPolicy. Any pod on the cluster network
#     *could* talk to it directly — that's the point of the lateral-move demo.
#
#   - `oauth2-proxy` is the identity-aware proxy in front. Policy is enforced
#     with --authenticated-emails-file: only emails in emails.txt pass.
#     alice@example.com is allowed, bob@example.com is denied at policy,
#     even though Bob authenticated successfully against Keycloak.
#
# The Zero Trust lesson: IP reachability is not access. Identity is access.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app
  namespace: zt-lab
data:
  index.html: |
    <!doctype html>
    <html><head><title>Zero Trust Demo</title></head>
    <body>
      <h1>You are inside the perimeter.</h1>
      <p>This page is gated by oauth2-proxy. Your identity was
         verified against Keycloak and then checked against an
         allowlist — the <em>Policy</em> piece of the four-part
         model.</p>
      <p>A rogue pod on the same cluster network cannot reach this
         page, because enforcement is at identity, not at IP.</p>
    </body></html>
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: oauth2-proxy-emails
  namespace: zt-lab
data:
  # The allowlist. Only these emails get past the proxy.
  emails.txt: |
    alice@example.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: zt-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: demo-app
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: zt-lab
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy
  namespace: zt-lab
type: Opaque
stringData:
  # run.sh overwrites these before apply.
  OAUTH2_PROXY_CLIENT_ID: zt-web-app
  OAUTH2_PROXY_CLIENT_SECRET: REPLACE_ME
  OAUTH2_PROXY_COOKIE_SECRET: REPLACE_ME_32_BYTES_BASE64
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: zt-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=keycloak-oidc
            - --oidc-issuer-url=http://localhost:8081/realms/zt
            - --client-id=$(OAUTH2_PROXY_CLIENT_ID)
            - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --http-address=0.0.0.0:4180
            - --upstream=http://demo-app.zt-lab.svc.cluster.local:80
            - --redirect-url=http://localhost:8080/oauth2/callback
            - --email-domain=*
            - --authenticated-emails-file=/etc/oauth2-proxy/emails.txt
            - --cookie-secure=false
            - --code-challenge-method=S256
            - --scope=openid profile email
          envFrom:
            - secretRef:
                name: oauth2-proxy
          ports:
            - containerPort: 4180
          volumeMounts:
            - name: emails
              mountPath: /etc/oauth2-proxy
      volumes:
        - name: emails
          configMap:
            name: oauth2-proxy-emails
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: zt-lab
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
