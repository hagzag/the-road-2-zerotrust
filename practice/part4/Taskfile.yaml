version: '3'

set: [errexit, pipefail]

tasks:
  info:
    desc: Print part title, blog URL, prereqs, and description
    silent: true
    cmds:
      - 'echo "Part 4 — WireGuard: Why Simpler Won"'
      - 'echo "Blog: https://portfolio.hagzag.com/blog/reading-lists/path2zerotrust/2026-04-20-wireguard-why-simpler-won/"'
      - 'echo "Prereqs: docker, k3d, kubectl, wg"'
      - 'echo "Description: WireGuard peers handshake and bench testing - simpler than OpenVPN."'

  check-prereqs:
    desc: Check required tools are installed
    cmds:
      - |
        for tool in docker k3d kubectl; do
          if ! command -v $tool &> /dev/null; then
            echo "ERROR: $tool not found"
            echo "Install: brew install $tool (macOS) or apt install $tool (Linux)"
            exit 1
          fi
        done
        if ! command -v wg &> /dev/null; then
          echo "ERROR: wg not found"
          echo "Install: brew install wireguard-tools (macOS) or apt install wireguard-tools (Linux)"
          exit 1
        fi
        echo "All prereqs satisfied"

  run:
    desc: Execute ./run.sh after prereq check
    deps: [check-prereqs]
    cmds:
      - ./run.sh

  bench:
    desc: Run iperf3 benchmark through tunnel
    cmds:
      - ./bench.sh

  capture:
    desc: Execute ./capture.sh to capture WireGuard handshake
    cmds:
      - ./capture.sh

  test:
    desc: Verify the lab is working correctly (Part 4 assertions)
    cmds:
      - |
        set -euo pipefail
        fail() { echo "FAIL: $1"; exit 1; }
        ok()   { echo "OK:   $1"; }

        # 1. k3d cluster wg-lab exists
        k3d cluster list --no-headers 2>/dev/null | awk '{print $1}' | grep -qx "wg-lab" || fail "cluster wg-lab does not exist"
        ok "cluster wg-lab exists"

        # 2. Deployments available
        kubectl -n wg-lab rollout status deploy/peer-a deploy/peer-b --timeout=30s || fail "rollout failed"
        ok "all deployments available"

        # 3. WireGuard interface up on peer-a
        kubectl exec -n wg-lab deploy/peer-a -- wg show wg0 >/dev/null 2>&1 || fail "wg0 interface not up on peer-a"
        ok "wg0 interface up on peer-a"

        # 4. Recent handshake (< 3 min ago)
        HS=$(kubectl exec -n wg-lab deploy/peer-a -- wg show wg0 latest-handshakes 2>/dev/null | awk '{print $2}')
        NOW=$(date +%s)
        AGE=$(( NOW - HS ))
        [ "$AGE" -lt 180 ] || fail "handshake is stale (${AGE}s ago)"
        ok "recent handshake (${AGE}s ago)"

        # 5. Ping across tunnel
        kubectl exec -n wg-lab deploy/peer-a -- ping -c3 -W2 10.99.0.2 >/dev/null 2>&1 || fail "ping to 10.99.0.2 failed"
        ok "ping to 10.99.0.2 succeeds"

        echo ""
        echo "=== All Part 4 tests passed ==="

  cleanup:
    desc: Execute ./cleanup.sh
    cmds:
      - ./cleanup.sh
