# Part 2 — LEGACY bastion: the "before" picture.
# No CA, no host certs, no principals. Just authorized_keys sprawl,
# old crypto, and agent-forwarding — the exact problems the blog post
# describes. Compare with bastion.yaml to see every difference.
apiVersion: v1
kind: ConfigMap
metadata:
  name: sshd-conf-legacy
  namespace: ssh-ca
data:
  sshd_config: |
    Port 2222
    PasswordAuthentication yes
    ChallengeResponseAuthentication yes
    PermitRootLogin yes
    PubkeyAuthentication yes
    AuthorizedKeysFile .ssh/authorized_keys
    HostKey /etc/ssh/ssh_host_ed25519_key
    KexAlgorithms diffie-hellman-group14-sha256,diffie-hellman-group-exchange-sha256
    Ciphers aes128-ctr,aes192-ctr,aes256-ctr
    MACs hmac-sha2-256,hmac-sha2-512
    AllowAgentForwarding yes
    LogLevel VERBOSE
    Subsystem sftp /usr/lib/ssh/sftp-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: legacy-bastion
  namespace: ssh-ca
  labels: { app: legacy-bastion }
spec:
  replicas: 1
  selector: { matchLabels: { app: legacy-bastion } }
  template:
    metadata:
      labels: { app: legacy-bastion }
    spec:
      containers:
        - name: sshd
          image: ssh-ca-sshd:latest
          imagePullPolicy: Never
          env:
            - { name: PUID, value: "1000" }
            - { name: PGID, value: "1000" }
            - { name: USER_NAME, value: "demo" }
          ports:
            - { name: ssh, containerPort: 2222 }
          volumeMounts:
            - { name: sshd-conf, mountPath: /mnt/sshd-config, readOnly: true }
            - { name: authorized-keys, mountPath: /mnt/authorized_keys, readOnly: true }
            - { name: host-key, mountPath: /etc/ssh/ssh_host_ed25519_key, subPath: ssh_host_ed25519_key }
            - { name: host-key, mountPath: /etc/ssh/ssh_host_ed25519_key.pub, subPath: ssh_host_ed25519_key.pub }
      volumes:
        - { name: sshd-conf, configMap: { name: sshd-conf-legacy } }
        - { name: authorized-keys, configMap: { name: legacy-authorized-keys } }
        - { name: host-key, secret: { secretName: legacy-bastion-host-key, defaultMode: 0600 } }
---
apiVersion: v1
kind: Service
metadata:
  name: legacy-bastion
  namespace: ssh-ca
spec:
  type: NodePort
  selector: { app: legacy-bastion }
  ports:
    - { name: ssh, port: 2222, targetPort: 2222, nodePort: 32223 }
