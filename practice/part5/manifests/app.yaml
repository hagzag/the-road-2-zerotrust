# oauth2-proxy + an nginx "protected app" behind it.
#
# oauth2-proxy acts as the OIDC client. It redirects unauthenticated
# requests to Keycloak, handles the Authorization Code + PKCE dance, and
# forwards the request upstream with X-Auth-Request-* headers once the
# user is logged in.
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-app
  namespace: auth-lab
data:
  index.html: |
    <!doctype html>
    <html><head><title>Protected App</title></head>
    <body>
      <h1>You are logged in.</h1>
      <p>This page is behind oauth2-proxy + Keycloak.</p>
      <p>Headers oauth2-proxy injected upstream:</p>
      <ul>
        <li>X-Auth-Request-User</li>
        <li>X-Auth-Request-Email</li>
      </ul>
      <p><a href="/oauth2/sign_out">Sign out</a></p>
    </body></html>
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-app
  namespace: auth-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-app
  template:
    metadata:
      labels:
        app: demo-app
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html
          configMap:
            name: demo-app
---
apiVersion: v1
kind: Service
metadata:
  name: demo-app
  namespace: auth-lab
spec:
  selector:
    app: demo-app
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oauth2-proxy
  namespace: auth-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oauth2-proxy
  template:
    metadata:
      labels:
        app: oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
          args:
            - --provider=keycloak-oidc
            - --oidc-issuer-url=http://keycloak.auth-lab.svc.cluster.local:8080/realms/lab
            - --skip-oidc-discovery
            - --login-url=http://localhost:8081/realms/lab/protocol/openid-connect/auth
            - --redeem-url=http://keycloak.auth-lab.svc.cluster.local:8080/realms/lab/protocol/openid-connect/token
            - --oidc-jwks-url=http://keycloak.auth-lab.svc.cluster.local:8080/realms/lab/protocol/openid-connect/certs
            - --client-id=$(OAUTH2_PROXY_CLIENT_ID)
            - --client-secret=$(OAUTH2_PROXY_CLIENT_SECRET)
            - --cookie-secret=$(OAUTH2_PROXY_COOKIE_SECRET)
            - --http-address=0.0.0.0:4180
            - --upstream=http://demo-app.auth-lab.svc.cluster.local:80
            - --redirect-url=http://localhost:8080/oauth2/callback
            - --email-domain=*
            - --cookie-secure=false
            - --code-challenge-method=S256
            - --scope=openid profile email
          envFrom:
            - secretRef:
                name: oauth2-proxy
          ports:
            - containerPort: 4180
---
apiVersion: v1
kind: Service
metadata:
  name: oauth2-proxy
  namespace: auth-lab
spec:
  selector:
    app: oauth2-proxy
  ports:
    - port: 4180
      targetPort: 4180
